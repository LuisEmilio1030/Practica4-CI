name: Alerta de Integración Continua

on:
  push:
    branches:
      - main

jobs:
  notificar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Ejecutar Hola Mundo
        run: node index.js

      - name: Enviar notificación a ntfy
        run: |
          curl -d "Nuevo push en main del repositorio ${{ github.repository }}" https://ntfy.sh/devops-itla