name: Alerta de Integración Continua

on:
  push:
    branches:
      - main

jobs:
  notificar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ejecutar Hola Mundo
        run: node index.js

      - name: Enviar notificación a ntfy
        run: |
          curl -H "Title: Integración Continua" \
          -d "Nuevo push realizado en la rama main del repositorio ${{ github.repository }}" \
          https://ntfy.sh/devops-itla